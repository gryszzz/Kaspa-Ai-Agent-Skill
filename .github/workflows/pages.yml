name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare Pages artifact
        id: upload
        run: |
          rm -rf /tmp/pages-artifact
          mkdir -p /tmp/pages-artifact
          cp -R docs/. /tmp/pages-artifact/
          DOMAIN="${{ vars.GH_PAGES_CNAME }}"
          if [ -z "$DOMAIN" ] && [ -f /tmp/pages-artifact/CNAME ]; then
            DOMAIN="$(tr -d '[:space:]' < /tmp/pages-artifact/CNAME)"
          fi
          if [ -n "$DOMAIN" ]; then
            echo "$DOMAIN" > /tmp/pages-artifact/CNAME
            echo "Using custom domain: $DOMAIN"
          else
            rm -f /tmp/pages-artifact/CNAME
            echo "Using default GitHub Pages project URL"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: /tmp/pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
