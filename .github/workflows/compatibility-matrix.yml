name: Compatibility Matrix

on:
  push:
    branches:
      - main
    paths:
      - "skills/public/kaspa-sovereign-architect-engine/**"
      - "scripts/toccata-source-monitor.mjs"
      - "scripts/toccata-source-monitor.test.mjs"
      - "scripts/lib/**"
      - "scripts/kaspa-knowledge-drill.mjs"
      - "scripts/covenant-lineage-prototype.mjs"
      - "scripts/vprog-scope-simulator.mjs"
      - "scripts/toccata-network-check.mjs"
      - "scripts/toccata-mainnet-readiness-gate.mjs"
      - "docs/kaspa/**"
      - "fixtures/toccata/**"
      - "research-snapshots/toccata/**"
      - "training-corpus/kaspa-toccata-*.md"
      - ".github/workflows/compatibility-matrix.yml"
      - ".github/workflows/toccata-source-monitor.yml"
  pull_request:
    paths:
      - "skills/public/kaspa-sovereign-architect-engine/**"
      - "scripts/toccata-source-monitor.mjs"
      - "scripts/toccata-source-monitor.test.mjs"
      - "scripts/lib/**"
      - "scripts/kaspa-knowledge-drill.mjs"
      - "scripts/covenant-lineage-prototype.mjs"
      - "scripts/vprog-scope-simulator.mjs"
      - "scripts/toccata-network-check.mjs"
      - "scripts/toccata-mainnet-readiness-gate.mjs"
      - "docs/kaspa/**"
      - "fixtures/toccata/**"
      - "research-snapshots/toccata/**"
      - "training-corpus/kaspa-toccata-*.md"
      - ".github/workflows/compatibility-matrix.yml"
      - ".github/workflows/toccata-source-monitor.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  full-validation:
    name: Full Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Run compatibility validator (all targets)
        run: |
          node skills/public/kaspa-sovereign-architect-engine/scripts/validate-compatibility.mjs --all
          node --test skills/public/kaspa-sovereign-architect-engine/scripts/validate-compatibility.test.mjs

      - name: Test Toccata source intelligence
        run: |
          node --test scripts/toccata-source-monitor.test.mjs
          node scripts/toccata-source-monitor.mjs --check

      - name: Run local knowledge drill
        run: |
          node scripts/kaspa-knowledge-drill.mjs > "$RUNNER_TEMP/kaspa-knowledge-drill.md"
          test -s "$RUNNER_TEMP/kaspa-knowledge-drill.md"

      - name: Run covenant lineage prototype
        run: node scripts/covenant-lineage-prototype.mjs --check-all

      - name: Run vProg scope simulator
        run: node scripts/vprog-scope-simulator.mjs --check

      - name: Run Toccata network endpoint checker
        run: node scripts/toccata-network-check.mjs --check

      - name: Run mainnet readiness gate
        run: node scripts/toccata-mainnet-readiness-gate.mjs --check

      - name: Build and smoke test skill package
        shell: bash
        run: |
          VERSION="$(node -e "const m=require('./skills/public/kaspa-sovereign-architect-engine/manifest.json'); process.stdout.write(m.version)")"
          OUT_DIR="$RUNNER_TEMP/kaspa-skill-package"
          EXTRACT_DIR="$RUNNER_TEMP/kaspa-skill-extracted"
          skills/public/kaspa-sovereign-architect-engine/scripts/package-release.sh "$OUT_DIR" "v$VERSION"
          mkdir -p "$EXTRACT_DIR"
          unzip -q "$OUT_DIR/kaspa-sovereign-architect-engine-v$VERSION.zip" -d "$EXTRACT_DIR"
          cd "$EXTRACT_DIR/kaspa-sovereign-architect-engine"
          node scripts/validate-compatibility.mjs --all
          node --test scripts/validate-compatibility.test.mjs
          node --test scripts/toccata-source-monitor.test.mjs
          node scripts/toccata-source-monitor.mjs --check
          node scripts/kaspa-knowledge-drill.mjs --check > "$RUNNER_TEMP/packaged-knowledge-drill.md"
          node scripts/covenant-lineage-prototype.mjs --check-all
          node scripts/vprog-scope-simulator.mjs --check
          node scripts/toccata-network-check.mjs --check
          node scripts/toccata-mainnet-readiness-gate.mjs --check

  target-matrix:
    name: Target ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - codex
          - openai
          - anthropic
          - cursor
          - openclaw
          - gemini
          - generic
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate target
        run: node skills/public/kaspa-sovereign-architect-engine/scripts/validate-compatibility.mjs --target ${{ matrix.target }}

  unix-installer-smoke:
    name: Installer smoke (${{ matrix.os }} / ${{ matrix.script }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        script:
          - install-codex.sh
          - install-openclaw.sh
          - install-gemini.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run installer
        shell: bash
        run: |
          TMP_HOME="$RUNNER_TEMP/home"
          mkdir -p "$TMP_HOME"
          export HOME="$TMP_HOME"
          export CODEX_HOME="$TMP_HOME/.codex"
          export OPENCLAW_SKILLS_DIR="$TMP_HOME/.openclaw/skills"
          export GEMINI_HOME="$TMP_HOME/.gemini"
          "skills/public/kaspa-sovereign-architect-engine/scripts/${{ matrix.script }}"

      - name: Verify install output
        shell: bash
        run: |
          case "${{ matrix.script }}" in
            install-codex.sh)
              test -f "$RUNNER_TEMP/home/.codex/skills/public/kaspa-sovereign-architect-engine/SKILL.md"
              ;;
            install-openclaw.sh)
              test -f "$RUNNER_TEMP/home/.openclaw/skills/kaspa-sovereign-architect-engine/SKILL.md"
              ;;
            install-gemini.sh)
              test -f "$RUNNER_TEMP/home/.gemini/kaspa-sovereign-architect-engine.gemini.md"
              grep -n "kaspa-sovereign-architect-engine.gemini.md" "$RUNNER_TEMP/home/.gemini/GEMINI.md"
              ;;
          esac

  windows-installer-smoke:
    name: Installer smoke (windows / install-codex.ps1)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run PowerShell installer
        shell: pwsh
        run: |
          $tempHome = Join-Path $env:RUNNER_TEMP "home"
          New-Item -ItemType Directory -Force -Path $tempHome | Out-Null
          $env:HOME = $tempHome
          $env:CODEX_HOME = Join-Path $tempHome ".codex"
          .\skills\public\kaspa-sovereign-architect-engine\scripts\install-codex.ps1

      - name: Verify install output
        shell: pwsh
        run: |
          $skillFile = Join-Path $env:RUNNER_TEMP "home/.codex/skills/public/kaspa-sovereign-architect-engine/SKILL.md"
          if (!(Test-Path $skillFile)) {
            Write-Error "Expected skill file missing: $skillFile"
          }
