name: Kaspa Source Intelligence

on:
  schedule:
    - cron: "47 12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: kaspa-source-intelligence
  cancel-in-progress: false

jobs:
  monitor:
    name: Snapshot live Kaspa sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Test source intelligence
        run: node --test scripts/kaspa-source-intelligence.test.mjs

      - name: Run Kaspa source intelligence
        run: node scripts/kaspa-source-intelligence.mjs --write-if-changed
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Detect snapshot changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet -- research-snapshots/source-intelligence; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update snapshot pull request
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="automation/kaspa-source-intelligence"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add research-snapshots/source-intelligence/latest.json research-snapshots/source-intelligence/latest.md
          git commit -m "Update Kaspa source intelligence snapshot"
          git push --force-with-lease origin "$BRANCH"

          cat > /tmp/kaspa-source-intelligence-pr.md <<'BODY'
          ## Summary
          - refreshes the live Kaspa source intelligence snapshot from primary sources
          - tracks Rusty Kaspa releases/refs, KIP metadata, docs/research fingerprints, and mainnet/TN10/TN12 blockDAG signals
          - preserves endpoint failures as unknown evidence instead of converting them into absence claims

          ## Review notes
          This PR is generated by the Kaspa Source Intelligence workflow. Review sourceHealth, latest release, network identity, KIP statuses, and any warnings before merging.
          BODY

          if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --repo "$GITHUB_REPOSITORY" --body-file /tmp/kaspa-source-intelligence-pr.md
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "Update Kaspa source intelligence snapshot" \
              --body-file /tmp/kaspa-source-intelligence-pr.md
          fi
