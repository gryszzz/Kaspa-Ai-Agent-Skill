name: Agent Toccata Smoke

on:
  push:
    branches: ["main"]
    paths:
      - "AGENTS.md"
      - "SYSTEM_ARCHITECTURE.md"
      - "TRAINING_SOURCES.md"
      - "PLANS.md"
      - "README.md"
      - "docs/toccata.md"
      - "docs/kaspa/**"
      - "docs/toccata-evidence-ladder.md"
      - "skills/public/kaspa-sovereign-architect-engine/**"
      - "scripts/toccata-network-check.mjs"
      - "scripts/toccata-mainnet-readiness-gate.mjs"
      - ".github/workflows/agent-toccata-smoke.yml"
  pull_request:
    paths:
      - "AGENTS.md"
      - "SYSTEM_ARCHITECTURE.md"
      - "TRAINING_SOURCES.md"
      - "PLANS.md"
      - "README.md"
      - "docs/toccata.md"
      - "docs/kaspa/**"
      - "docs/toccata-evidence-ladder.md"
      - "skills/public/kaspa-sovereign-architect-engine/**"
      - "scripts/toccata-network-check.mjs"
      - "scripts/toccata-mainnet-readiness-gate.mjs"
      - ".github/workflows/agent-toccata-smoke.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  smoke:
    name: Source-truth and network gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate skill source-truth contract
        run: node skills/public/kaspa-sovereign-architect-engine/scripts/validate-compatibility.mjs --all

      - name: Validate release surface
        run: node scripts/validate-skill-release.mjs --check

      - name: Run Toccata network endpoint check
        run: node scripts/toccata-network-check.mjs --check

      - name: Run mainnet readiness gate
        run: node scripts/toccata-mainnet-readiness-gate.mjs --check
