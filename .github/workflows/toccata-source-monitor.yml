name: Toccata Source Monitor

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: toccata-source-monitor
  cancel-in-progress: false

jobs:
  monitor:
    name: Snapshot primary Toccata sources
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Test source intelligence
        run: node --test scripts/toccata-source-monitor.test.mjs

      - name: Run Toccata source monitor
        run: node scripts/toccata-source-monitor.mjs --write-if-changed
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Detect snapshot changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet -- research-snapshots/toccata; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update snapshot pull request
        if: steps.diff.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="automation/toccata-source-monitor"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add research-snapshots/toccata/latest.json research-snapshots/toccata/latest.md
          git commit -m "Update Toccata source snapshot"
          git push --force-with-lease origin "$BRANCH"

          cat > /tmp/toccata-monitor-pr.md <<'BODY'
          ## Summary
          - refreshes the Toccata source snapshot from primary sources
          - tracks Rusty Kaspa PRs, KIP PRs, branch deltas, releases, docs fingerprints, and mainnet/TN10/TN12 blockdag signals
          - classifies upstream changes by engineering impact and keeps activation claims gated by the mainnet DAA

          ## Review notes
          This PR is generated by the Toccata Source Monitor workflow. It should be merged only when the source changes look plausible.
          BODY

          if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" --repo "$GITHUB_REPOSITORY" --body-file /tmp/toccata-monitor-pr.md
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "Update Toccata source snapshot" \
              --body-file /tmp/toccata-monitor-pr.md
          fi
