name: Release Skill Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1
        with:
          version: 1.2.0

      - name: Validate compatibility (release gate)
        run: |
          node skills/public/kaspa-sovereign-architect-engine/scripts/validate-compatibility.mjs --all
          node skills/public/kaspa-sovereign-architect-engine/scripts/run-behavioral-evals.mjs --check
          node --test skills/public/kaspa-sovereign-architect-engine/scripts/*.test.mjs
          node scripts/validate-skill-release.mjs --check
          node --test scripts/validate-skill-release.test.mjs
          node --test scripts/toccata-source-monitor.test.mjs
          node scripts/toccata-source-monitor.mjs --check
          node --test scripts/kaspa-source-intelligence.test.mjs
          node scripts/kaspa-source-intelligence.mjs --check
          node scripts/kaspa-knowledge-drill.mjs --check > "$RUNNER_TEMP/kaspa-knowledge-drill.md"
          node scripts/covenant-lineage-prototype.mjs --check-all
          node scripts/vprog-scope-simulator.mjs --check
          node scripts/toccata-network-check.mjs --check
          node scripts/toccata-mainnet-readiness-gate.mjs --check

      - name: Package skill artifacts
        run: |
          skills/public/kaspa-sovereign-architect-engine/scripts/package-release.sh "$GITHUB_WORKSPACE/dist-artifacts" "${GITHUB_REF_NAME}"

      - name: Smoke test packaged skill
        shell: bash
        run: |
          EXTRACT_DIR="$RUNNER_TEMP/kaspa-skill-package"
          mkdir -p "$EXTRACT_DIR"
          unzip -q "dist-artifacts/kaspa-sovereign-architect-engine-${GITHUB_REF_NAME}.zip" -d "$EXTRACT_DIR"
          cd "$EXTRACT_DIR/kaspa-sovereign-architect-engine"
          node scripts/validate-compatibility.mjs --all
          node scripts/run-behavioral-evals.mjs --check
          node --test scripts/*.test.mjs
          node scripts/toccata-source-monitor.mjs --check
          node scripts/kaspa-source-intelligence.mjs --check
          node scripts/kaspa-knowledge-drill.mjs --check > "$RUNNER_TEMP/packaged-knowledge-drill.md"
          node scripts/covenant-lineage-prototype.mjs --check-all
          node scripts/vprog-scope-simulator.mjs --check
          node scripts/toccata-network-check.mjs --check
          node scripts/toccata-mainnet-readiness-gate.mjs --check

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Publish skill package to GitHub Packages
        shell: bash
        env:
          PACKAGE_REF: ghcr.io/${{ github.repository_owner }}/kaspa-sovereign-architect-engine
        run: |
          oras push "$PACKAGE_REF:${GITHUB_REF_NAME}" \
            --artifact-type application/vnd.kaspa.skill.package.v1 \
            --annotation "org.opencontainers.image.title=Kaspa Sovereign Architect Engine" \
            --annotation "org.opencontainers.image.description=Source-grounded Kaspa protocol and Toccata engineering skill with Codex, OpenAI, Claude, Cursor, OpenClaw, Gemini, and generic adapters." \
            --annotation "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            --annotation "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            --annotation "org.opencontainers.image.revision=${GITHUB_SHA}" \
            "dist-artifacts/kaspa-sovereign-architect-engine-${GITHUB_REF_NAME}.zip:application/zip" \
            "dist-artifacts/kaspa-sovereign-architect-engine-${GITHUB_REF_NAME}.tar.gz:application/gzip" \
            "dist-artifacts/SHA256SUMS.txt:text/plain"
          oras tag "$PACKAGE_REF:${GITHUB_REF_NAME}" latest

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          NOTES_FILE="$GITHUB_WORKSPACE/release-notes/${TAG_NAME}.md"
          if [[ -f "$NOTES_FILE" ]]; then
            echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          else
            FALLBACK="$GITHUB_WORKSPACE/release-notes/v1.0.0.md"
            echo "notes_file=$FALLBACK" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-artifacts/*
          body_path: ${{ steps.notes.outputs.notes_file }}
          name: Kaspa Sovereign Architect Engine ${{ github.ref_name }}
          generate_release_notes: true
